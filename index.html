<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/flowers.png" type="image/x-icon">
    <title>Flowers</title>
    <style>
        /* Additional styling for the "No" button */
        .button {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px; /* Gap between buttons */
        }
        .no-button {
            position: relative;
            transition: transform 0.3s ease-in-out;
        }

        /* Styling for the footer text */
        .footer {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px; /* Adjust the font size */
        }
    </style>
</head>
<body>
    <div class="greetings">
    <span style="--i:1">KATHERINE,</span>
    <span style="--i:2">DO</span>
    <span style="--i:3">YOU</span>
    <span style="--i:4">WANT</span>
    <span style="--i:5">A</span>
    <span style="--i:6">FLOWER?</span>
</div>
    <div class="description">
        <span>Click the button below</span>
    </div>
    <div class="button">
    <div class="btn-wrap">
        <button class="yes-btn">
            <a href="flower.html">Yes</a>
        </button>
    </div>

    <div class="btn-wrap">
        <button class="no-button">
            <a>No</a>
        </button>
    </div>
</div>
    
    <script>
    const noButton = document.querySelector('.no-button');

    // Fungsi kabur super agresif
    function moveNoButton() {
        const maxX = window.innerWidth - noButton.offsetWidth;
        const maxY = window.innerHeight - noButton.offsetHeight;

        const randomX = Math.random() * maxX;
        const randomY = Math.random() * maxY;

        noButton.style.position = "absolute";
        noButton.style.left = randomX + "px";
        noButton.style.top = randomY + "px";

        // efek lompat cepat
        noButton.style.transition = "all 0.2s ease";
    }

    // Biar dia kabur sebelum diklik (hover)
    noButton.addEventListener("mouseenter", moveNoButton);

    // Kalau berhasil diklik → lempar jauh + muter + hilang
    noButton.addEventListener("click", () => {
        noButton.style.transition = "all 0.6s ease";
        noButton.style.transform = "translate(-1000px, -1000px) rotate(720deg) scale(0.2)";
        noButton.style.opacity = "0";

        setTimeout(() => {
            moveNoButton();
            noButton.style.transform = "scale(1)";
            noButton.style.opacity = "1";
        }, 600);
    });
</script>

    <div class="footer">
        <span>&copy;JosuaLimbu</span>
    </div>
</body>
</html>
